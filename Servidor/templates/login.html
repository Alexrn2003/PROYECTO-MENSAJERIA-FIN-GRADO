<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login del chat</title>
  <style>
    /* 1. Reset de estilos básicos */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background-color: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    /* 2. Contenedor principal (Card) */
    .login-container {
      background-color: #ffffff;
      padding: 2.5rem;
      border-radius: 10px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 400px;
    }

    h2 {
      text-align: center;
      color: #333;
      margin-bottom: 1.5rem;
      font-size: 1.8rem;
    }

    /* 3. Estilos del formulario */
    .form-group {
      margin-bottom: 1rem;
    }

    input {
      width: 100%;
      padding: 12px 15px;
      margin: 8px 0;
      display: inline-block;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 1rem;
      transition: border-color 0.3s ease;
    }

    input:focus {
      outline: none;
      border-color: #007bff;
      box-shadow: 0 0 0 2px rgba(0,123,255,0.25);
    }

    /* 4. Botón estilizado */
    button {
      width: 100%;
      background-color: #007bff;
      color: white;
      padding: 12px;
      margin-top: 1rem;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: bold;
      transition: background-color 0.3s ease;
    }

    button:hover {
      background-color: #0056b3;
    }

    button:active {
      transform: scale(0.98);
    }

    /* Mensaje de ayuda opcional */
    .footer-text {
      text-align: center;
      margin-top: 1rem;
      font-size: 0.85rem;
      color: #666;
    }
  </style>
</head>
<body>

  <div class="login-container">
    <h2>Iniciar Sesión</h2>

    <form id="loginForm">
      <div class="form-group">
        <input type="text" id="user" placeholder="Usuario (dominio)" required autocomplete="username" />  
      </div>
      <div class="form-group">
        <input type="password" id="pass" placeholder="Contraseña" required autocomplete="current-password" />
      </div>
      <button type="submit" id="loginBtn">Entrar</button>
      <div id="errorMsg" style="display: none; color: red; margin-top: 1rem; text-align: center;"></div>
      <div id="loadingMsg" style="display: none; color: #007bff; margin-top: 1rem; text-align: center;">
        Autenticando...
      </div>
    </form>

    <p class="footer-text">Acceso restringido a personal del dominio EasyCom.local</p>
  </div>

  <script>
    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const user = document.getElementById("user").value.trim();
      const pass = document.getElementById("pass").value;
      const errorMsg = document.getElementById("errorMsg");
      const loadingMsg = document.getElementById("loadingMsg");
      const loginBtn = document.getElementById("loginBtn");

      if (!user || !pass) {
        errorMsg.textContent = "Por favor completa todos los campos";
        errorMsg.style.display = "block";
        return;
      }

      errorMsg.style.display = "none";
      loadingMsg.style.display = "block";
      loginBtn.disabled = true;

      try {
        // Detectar si la URL actual es HTTP o HTTPS
        const protocol = window.location.protocol;
        const host = window.location.host;
        const url = `${protocol}//${host}/login`;

        const response = await fetch(url, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ user, password: pass })
        });

        const data = await response.json();
        
        if (data.success) {
          // Guardar datos del usuario en sessionStorage
          sessionStorage.setItem("username", data.username);
          sessionStorage.setItem("display_name", data.display_name || data.username);
          sessionStorage.setItem("role", data.role);
          
          // Redirigir al chat
          window.location.href = "/chat";
        } else {
          errorMsg.textContent = data.error || "Usuario o contraseña incorrectos";
          errorMsg.style.display = "block";
        }
      } catch (error) {
        console.error("Error de conexión:", error);
        errorMsg.textContent = "No se pudo conectar con el servidor. Verifica la conexión.";
        errorMsg.style.display = "block";
      } finally {
        loadingMsg.style.display = "none";
        loginBtn.disabled = false;
      }
    });
  </script>

</body>
</html>
