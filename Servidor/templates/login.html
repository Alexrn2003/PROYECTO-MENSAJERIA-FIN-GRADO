<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Chat Corporativo</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="login-page">

  <div class="login-container">
    <h2>Iniciar Sesión</h2>

    <div id="errorMsg" class="error-message"></div>
    <div id="loadingMsg" class="loading">Autenticando...</div>

    <form id="loginForm">
      <div class="form-group">
        <label for="user">Usuario (dominio)</label>
        <input type="text" id="user" placeholder="ej: administrador" required autocomplete="username" />  
      </div>
      <div class="form-group">
        <label for="pass">Contraseña</label>
        <input type="password" id="pass" placeholder="Ingresa tu contraseña" required autocomplete="current-password" />
      </div>
      <button type="submit" id="loginBtn" class="login-btn">Entrar</button>
    </form>

    <p style="text-align: center; margin-top: 1.5rem; font-size: 0.85rem; color: #999;">
      Acceso restringido a personal del dominio EasyCom.local
    </p>
  </div>

  <script>
    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const user = document.getElementById("user").value.trim();
      const pass = document.getElementById("pass").value;
      const errorMsg = document.getElementById("errorMsg");
      const loadingMsg = document.getElementById("loadingMsg");
      const loginBtn = document.getElementById("loginBtn");

      if (!user || !pass) {
        errorMsg.textContent = "Por favor completa todos los campos";
        errorMsg.classList.add("show");
        return;
      }

      errorMsg.classList.remove("show");
      loadingMsg.classList.add("show");
      loginBtn.disabled = true;

      try {
        const protocol = window.location.protocol;
        const host = window.location.host;
        const url = `${protocol}//${host}/login`;

        const response = await fetch(url, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ user, password: pass })
        });

        const data = await response.json();
        
        if (data.success) {
          sessionStorage.setItem("username", data.username);
          sessionStorage.setItem("display_name", data.display_name || data.username);
          sessionStorage.setItem("role", data.role);
          
          window.location.href = "/chat";
        } else {
          errorMsg.textContent = data.error || "Usuario o contraseña incorrectos";
          errorMsg.classList.add("show");
        }
      } catch (error) {
        console.error("Error de conexión:", error);
        errorMsg.textContent = "No se pudo conectar con el servidor. Verifica la conexión.";
        errorMsg.classList.add("show");
      } finally {
        loadingMsg.classList.remove("show");
        loginBtn.disabled = false;
      }
    });
  </script>

</body>
</html>
